services:
  # 1. Backend API (Node.js/NestJS)
  - type: web
    name: clover-wallet-api
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    buildFilter:
      paths:
        - apps/backend/**
        - packages/shared/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FIREBASE_KEY_PATH
        value: ./firebase-key.json
    healthCheckPath: /api/v1
    autoDeploy: true

  # 2. Frontend Web (React Native/Expo)
  - type: static
    name: clover-wallet-web
    env: static
    region: singapore
    plan: free
    rootDir: apps/frontend
    buildFilter:
      paths:
        - apps/frontend/**
        - packages/shared/**
        - render.yaml
    buildCommand: npm install --legacy-peer-deps && npx expo export --platform web
    publishPath: dist
    autoDeploy: true
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://clover-wallet-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
