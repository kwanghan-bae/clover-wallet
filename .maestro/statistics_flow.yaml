appId: com.clover.wallet
name: Statistics Screen
---
- launchApp
- tapOn: "Google 계정으로 계속하기"
- assertVisible:
    text: "다음 추첨까지"
    timeout: 10000
# Navigate to statistics via quick action
- tapOn: "번호 분석"
- assertVisible:
    text: "번호 분석"
    timeout: 5000
# Verify summary cards visible
- assertVisible: "총 게임"
- assertVisible: "수익률"
# Verify winnings card visible
- assertVisible: "당첨 현황"
- assertVisible: "총 당첨금"
- assertVisible: "총 투자"
# Verify number frequency section
- assertVisible: "자주 나온 번호 TOP 10"
